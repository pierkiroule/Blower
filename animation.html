<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation · Le Nid SonART</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Quicksand', sans-serif;
      background: radial-gradient(circle at 20% 10%, #1a3050, #0a142a 48%, #04070e 100%);
      color: #fff;
      padding: 16px;
    }
    .container { max-width: 980px; margin: 0 auto; }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    h1 { margin: 0; font-size: clamp(22px, 4vw, 32px); }
    .links { display: flex; gap: 8px; flex-wrap: wrap; }
    .pill-link {
      text-decoration: none;
      color: #d8e8ff;
      border: 1px solid rgba(255,255,255,0.3);
      background: rgba(10, 18, 35, 0.55);
      border-radius: 999px;
      padding: 9px 14px;
      font-size: 13px;
      font-weight: 600;
    }
    .intro { margin: 0 0 12px; opacity: 0.82; line-height: 1.5; }
    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .card {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      padding: 12px;
      display: grid;
      gap: 10px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .card h2 { margin: 0; font-size: 17px; }
    .row { display: grid; gap: 6px; }
    label { font-size: 12px; opacity: 0.86; }
    select {
      width: 100%;
      min-height: 40px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.25);
      background: rgba(7, 13, 27, 0.72);
      color: #fff;
      padding: 8px;
      font-family: 'Quicksand', sans-serif;
      font-size: 13px;
      font-weight: 600;
    }
    .footer {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 12px;
    }
    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 10px;
      min-height: 40px;
      font-family: 'Quicksand', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: #fff;
      background: rgba(10, 18, 35, 0.65);
      padding: 8px 12px;
      cursor: pointer;
    }
    .note { font-size: 12px; opacity: 0.8; }

    @media (max-width: 760px) {
      .grid { grid-template-columns: 1fr; }
      body { padding: 12px; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="topbar">
      <h1>Animation des bulles</h1>
      <div class="links">
        <a class="pill-link" href="./index.html">← Retour Cam</a>
        <a class="pill-link" href="./config.html">Config audio</a>
      </div>
    </div>

    <p class="intro">Réglage simple par bulle : choisis 1 des 3 trajectoires et le sens (horaire/anti-horaire). Ces paramètres sont utilisés dans la scène caméra.</p>

    <section class="grid" id="animGrid"></section>

    <div class="footer">
      <span class="note">Sauvegarde locale automatique (localStorage).</span>
      <button class="btn" id="resetBtn" type="button">Réinitialiser toutes les bulles</button>
    </div>
  </main>

  <script>
    (() => {
      'use strict'

      const STORAGE_KEY = 'sonart.bubbleTrajectories.v1'
      const BUBBLE_COUNT = 8
      const TYPES = [
        { value: 'circle', label: 'Cercle' },
        { value: 'figure8', label: 'Huit' },
        { value: 'spiral', label: 'Spirale' }
      ]
      const DIRECTIONS = [
        { value: 'horaire', label: 'Horaire' },
        { value: 'anti', label: 'Anti-horaire' }
      ]

      const animGrid = document.getElementById('animGrid')
      const resetBtn = document.getElementById('resetBtn')
      const state = loadState()

      function safeParseObject(rawValue) {
        try {
          const parsed = JSON.parse(rawValue || '{}')
          return parsed && typeof parsed === 'object' ? parsed : {}
        } catch (_) {
          return {}
        }
      }
      function loadState() {
        return safeParseObject(localStorage.getItem(STORAGE_KEY))
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state))
      }

      function getBubbleCfg(index) {
        return state[`b${index}`] || { type: 'circle', direction: 'horaire' }
      }

      function render() {
        animGrid.innerHTML = ''

        for (let i = 1; i <= BUBBLE_COUNT; i++) {
          const cfg = getBubbleCfg(i)
          const card = document.createElement('article')
          card.className = 'card'
          card.innerHTML = `
            <h2>Bulle ${i}</h2>
            <div class="row">
              <label for="type-${i}">Trajectoire</label>
              <select id="type-${i}" class="type-select">
                ${TYPES.map(t => `<option value="${t.value}" ${cfg.type === t.value ? 'selected' : ''}>${t.label}</option>`).join('')}
              </select>
            </div>
            <div class="row">
              <label for="dir-${i}">Sens</label>
              <select id="dir-${i}" class="dir-select">
                ${DIRECTIONS.map(d => `<option value="${d.value}" ${cfg.direction === d.value ? 'selected' : ''}>${d.label}</option>`).join('')}
              </select>
            </div>
          `

          const typeSelect = card.querySelector('.type-select')
          const dirSelect = card.querySelector('.dir-select')

          const update = () => {
            state[`b${i}`] = {
              type: typeSelect.value,
              direction: dirSelect.value
            }
            saveState()
          }

          typeSelect.addEventListener('change', update)
          dirSelect.addEventListener('change', update)

          animGrid.appendChild(card)
        }
      }

      resetBtn.addEventListener('click', () => {
        for (let i = 1; i <= BUBBLE_COUNT; i++) delete state[`b${i}`]
        saveState()
        render()
      })

      render()
    })()
  </script>
</body>
</html>
