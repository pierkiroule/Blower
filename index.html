<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Paysage de Bulles AR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    touch-action: none;
    font-family: 'Quicksand', sans-serif;
  }

  #sceneZone {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    overflow: hidden;
  }

  #cam {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }
  canvas { position: absolute; inset: 0; z-index: 10; pointer-events: none; }
  #hud { position: absolute; inset: 0; z-index: 20; pointer-events: none; }

  #crosshair {
    position: absolute; left: 50%; top: 50%;
    width: 56px; height: 56px;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  #crosshair svg { width: 100%; height: 100%; overflow: visible; }

  #topbar {
    position: absolute; top: 14px; left: 14px; right: 14px;
    display: flex; justify-content: space-between; align-items: center;
    gap: 10px;
    pointer-events: auto;
  }
  #status {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .topbar-actions {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-left: auto;
    flex-shrink: 0;
  }
  .pill {
    padding: 8px 14px; border-radius: 999px;
    color: rgba(255,255,255,0.9); font-size: 12px; font-weight: 600;
    letter-spacing: 0.04em; background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  }
  .row { display: flex; gap: 8px; }
  .btn-pill {
    appearance: none; border: 1px solid rgba(255,255,255,0.28);
    background: rgba(0,0,0,0.4); color: rgba(255,255,255,0.9);
    border-radius: 999px; padding: 8px 14px;
    font-size: 12px; font-family: 'Quicksand', sans-serif;
    font-weight: 600; letter-spacing: 0.04em;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    touch-action: manipulation; pointer-events: auto;
  }
  .menu-wrap { position: relative; }
  .menu-btn {
    width: 40px;
    height: 40px;
    padding: 0;
    font-size: 20px;
    line-height: 1;
  }
  .burger-menu {
    position: absolute;
    top: calc(100% + 8px);
    right: 0;
    min-width: 170px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.22);
    background: rgba(6, 10, 24, 0.88);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.35);
    overflow: hidden;
  }
  .burger-menu a {
    display: block;
    padding: 10px 14px;
    color: rgba(255,255,255,0.92);
    text-decoration: none;
    font-size: 13px;
    font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  .burger-menu a:last-child { border-bottom: 0; }
  .burger-menu a:hover,
  .burger-menu a:focus-visible {
    background: rgba(120,210,255,0.15);
    outline: none;
  }

  #dbg {
    position: absolute; top: 60px; left: 14px;
    color: rgba(255,255,255,0.58); font-size: 10px; font-weight: 300;
    line-height: 1.6; background: rgba(0,0,0,0.3);
    padding: 4px 8px; border-radius: 6px; pointer-events: none;
  }

  #uiPanel {
    position: fixed;
    left: 50%;
    bottom: 12px;
    transform: translateX(-50%);
    width: min(580px, calc(100vw - 18px));
    z-index: 40;
    pointer-events: auto;
    background: rgba(6, 10, 24, 0.48);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    box-shadow: 0 8px 26px rgba(0,0,0,0.35);
    padding: 10px;
  }

  #controls {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 8px;
    align-items: stretch;
  }
  .control-btn {
    appearance: none;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.28);
    background: rgba(0,0,0,0.35);
    color: #fff;
    min-height: 42px;
    padding: 6px 8px;
    font-size: 13px;
    font-family: 'Quicksand', sans-serif;
    font-weight: 600;
    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
    touch-action: manipulation;
  }
  #placeBtn {
    grid-column: 1 / -1;
    border-color: rgba(120,210,255,0.6);
    color: #aee8ff;
    min-height: 46px;
    font-size: 15px;
  }

  #hintInline {
    color: rgba(255,255,255,0.48);
    text-align: center;
    font-size: 10px;
    letter-spacing: 0.07em;
    padding-top: 8px;
  }

  @media (max-width: 840px) {
    #uiPanel {
      bottom: 8px;
      width: calc(100vw - 12px);
      padding: 9px;
      border-radius: 14px;
    }
    #controls {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
    #topbar {
      top: 10px;
      left: 10px;
      right: 10px;
    }
    #status {
      font-size: 11px;
      padding-right: 4px;
    }
  }

  #permOverlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 18px; padding: 32px;
  }
  #permOverlay h2 { color: #fff; font-size: 20px; font-weight: 600; text-align: center; }
  #permOverlay p {
    color: rgba(255,255,255,0.5); font-size: 13px;
    text-align: center; line-height: 1.6; max-width: 320px;
  }
  #startBtn {
    appearance: none; padding: 14px 36px; border-radius: 999px;
    border: 1.5px solid rgba(120,210,255,0.7);
    background: rgba(120,210,255,0.1); color: #aee8ff;
    font-family: 'Quicksand', sans-serif; font-size: 15px; font-weight: 600;
    letter-spacing: 0.08em; cursor: pointer;
    box-shadow: 0 0 24px rgba(120,210,255,0.15);
  }
  .bicon {
    width: 60px; height: 60px; border-radius: 50%;
    border: 2px solid rgba(120,210,255,0.55);
    background: radial-gradient(circle at 32% 32%, rgba(200,240,255,0.25), rgba(100,180,255,0.06));
    box-shadow: 0 0 22px rgba(120,210,255,0.25);
    animation: bfloat 2.6s ease-in-out infinite;
  }
  @keyframes bfloat {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
</style>
</head>
<body>

<div id="sceneZone">
  <video id="cam" autoplay playsinline muted></video>

  <div id="hud">
    <div id="crosshair">
      <svg viewBox="-28 -28 56 56">
        <circle cx="0" cy="0" r="16" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.1"/>
        <line x1="0" y1="-24" x2="0" y2="-20" stroke="rgba(255,255,255,0.7)" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="0" y1="20" x2="0" y2="24" stroke="rgba(255,255,255,0.7)" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="-24" y1="0" x2="-20" y2="0" stroke="rgba(255,255,255,0.7)" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="20" y1="0" x2="24" y2="0" stroke="rgba(255,255,255,0.7)" stroke-width="1.4" stroke-linecap="round"/>
        <circle id="crossDot" cx="0" cy="0" r="1.8" fill="rgba(255,255,255,0.55)"/>
      </svg>
    </div>

    <div id="topbar">
      <div class="pill" id="status">○ ○ ○ ○ ○ ○ ○ ○</div>
      <div class="topbar-actions">
        <div class="row">
          <button class="btn-pill" id="recalBtn">recal</button>
          <button class="btn-pill" id="clearBtn">effacer</button>
        </div>
        <div class="menu-wrap">
          <button class="btn-pill menu-btn" id="menuBtn" aria-expanded="false" aria-controls="mainMenu" aria-label="Ouvrir le menu">☰</button>
          <nav class="burger-menu" id="mainMenu" hidden>
            <a href="./index.html">Retour Cam</a>
            <a href="./index.html">Accueil</a>
            <a href="./config.html">Config</a>
            <a href="./animation.html">Animation</a>
            <a href="./index.html">Le Nid SonART</a>
            <a href="/profil">Profil</a>
          </nav>
        </div>
      </div>
    </div>

    <div id="dbg"></div>
  </div>
</div>

<div id="uiPanel">
  <div id="controls">
    <button class="control-btn" id="minusBtn">distance −</button>
    <button class="control-btn" id="plusBtn">distance +</button>
    <button class="control-btn" id="colorBtn">couleur</button>
    <button class="control-btn" id="sizeDownBtn">taille −</button>
    <button class="control-btn" id="sizeUpBtn">taille +</button>
    <button class="control-btn" id="placeBtn">poser là</button>
  </div>
  <div id="hintInline">Zone caméra prioritaire · commandes bulle compactes</div>
</div>

<div id="permOverlay">
  <div class="bicon"></div>
  <h2>Paysage de Bulles AR</h2>
  <p>Regarde autour de toi et pose les bulles avec « poser là ». Utilise les commandes du bas pour éditer les bulles.</p>
  <button id="startBtn">Commencer ✦</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script>
(() => {
'use strict'

const MAX_BUBBLES = 8
const USER_H = 1.55
const MIN_DISTANCE = 1.0
const MAX_DISTANCE = 8.0
const DISTANCE_STEP = 0.2
const MIN_SCALE = 0.45
const MAX_SCALE = 2.3
const SCALE_STEP = 0.12
const TRAJECTORY_STORAGE_KEY = 'sonart.bubbleTrajectories.v1'

const sceneZone = document.getElementById('sceneZone')
const video = document.getElementById('cam')
const statusEl = document.getElementById('status')
const clearBtn = document.getElementById('clearBtn')
const recalBtn = document.getElementById('recalBtn')
const permOverlay = document.getElementById('permOverlay')
const startBtn = document.getElementById('startBtn')
const dbgEl = document.getElementById('dbg')
const crossDot = document.getElementById('crossDot')
const minusBtn = document.getElementById('minusBtn')
const plusBtn = document.getElementById('plusBtn')
const placeBtn = document.getElementById('placeBtn')
const colorBtn = document.getElementById('colorBtn')
const sizeDownBtn = document.getElementById('sizeDownBtn')
const sizeUpBtn = document.getElementById('sizeUpBtn')
const menuBtn = document.getElementById('menuBtn')
const mainMenu = document.getElementById('mainMenu')

function closeMenu() {
  mainMenu.hidden = true
  menuBtn.setAttribute('aria-expanded', 'false')
}

function toggleMenu() {
  const open = mainMenu.hidden
  mainMenu.hidden = !open
  menuBtn.setAttribute('aria-expanded', open ? 'true' : 'false')
}

menuBtn.addEventListener('click', e => {
  e.stopPropagation()
  toggleMenu()
})

window.addEventListener('pointerdown', e => {
  if (mainMenu.hidden) return
  if (mainMenu.contains(e.target) || menuBtn.contains(e.target)) return
  closeMenu()
})

window.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeMenu()
})

for (const link of mainMenu.querySelectorAll('a')) {
  link.addEventListener('click', () => closeMenu())
}

let W = sceneZone.clientWidth
let H = sceneZone.clientHeight
const scene = new THREE.Scene()
const camera = new THREE.PerspectiveCamera(68, W / H, 0.05, 80)
camera.position.set(0, USER_H, 0)

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true })
renderer.setPixelRatio(Math.min(devicePixelRatio || 1, 2))
renderer.setSize(W, H)
renderer.setClearColor(0x000000, 0)
sceneZone.appendChild(renderer.domElement)

scene.add(new THREE.AmbientLight(0xffffff, 0.85))
const sun = new THREE.DirectionalLight(0xffffff, 1.0)
sun.position.set(3, 5, 3)
scene.add(sun)

const previewMesh = (() => {
  const m = new THREE.Mesh(
    new THREE.SphereGeometry(0.20, 18, 18),
    new THREE.MeshBasicMaterial({ color: 0x88ddff, transparent: true, opacity: 0.24, depthWrite: false })
  )
  m.add(new THREE.Mesh(
    new THREE.SphereGeometry(0.33, 12, 12),
    new THREE.MeshBasicMaterial({ color: 0x88ddff, transparent: true, opacity: 0.09, depthWrite: false })
  ))
  scene.add(m)
  return m
})()

const bubbles = []
const raycaster = new THREE.Raycaster()
const center2D = new THREE.Vector2(0, 0)
const tmpLook = new THREE.Vector3()
const tmpDir = new THREE.Vector3()

let currentDistance = MIN_DISTANCE
let currentScale = 1.0
let currentColor = new THREE.Color().setHSL(Math.random(), 0.95, 0.6)
let selectedBubble = null
let bubbleIdCounter = 1

function loadTrajectoryMap() {
  try {
    return JSON.parse(localStorage.getItem(TRAJECTORY_STORAGE_KEY) || '{}')
  } catch (_) {
    return {}
  }
}

const trajectoryMap = loadTrajectoryMap()

function getTrajectoryConfig(id) {
  const raw = trajectoryMap[`b${id}`] || {}
  const type = ['circle', 'figure8', 'spiral'].includes(raw.type) ? raw.type : 'circle'
  const direction = raw.direction === 'anti' ? -1 : 1
  return { type, direction }
}
function startCamera() {
  return navigator.mediaDevices.getUserMedia({
    video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 } },
    audio: false
  }).then(st => {
    video.srcObject = st
    return video.play().catch(() => {})
  }).catch(e => console.warn('Cam:', e))
}

const _qDevice = new THREE.Quaternion()
const _qBase = new THREE.Quaternion()
const _qBaseInv = new THREE.Quaternion()
const _qFinal = new THREE.Quaternion()
const _qSmooth = new THREE.Quaternion()

const _zee = new THREE.Vector3(0, 0, 1)
const _q0 = new THREE.Quaternion()
const _q1 = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5))
const _gyroEuler = new THREE.Euler()

function getScreenOrientationRad() {
  const angle = (screen.orientation && typeof screen.orientation.angle === 'number')
    ? screen.orientation.angle
    : (typeof window.orientation === 'number' ? window.orientation : 0)
  return THREE.MathUtils.degToRad(angle)
}

function setObjectQuaternion(quaternion, alpha, beta, gamma, orient) {
  _gyroEuler.set(beta, alpha, -gamma, 'YXZ')
  quaternion.setFromEuler(_gyroEuler)
  quaternion.multiply(_q1)
  quaternion.multiply(_q0.setFromAxisAngle(_zee, -orient))
}

let gyroActive = false
let gyroCalib = false

function recalibrateGyro() {
  gyroCalib = false
}

function onGyro(e) {
  if (!gyroActive || e.alpha == null) return

  const a = THREE.MathUtils.degToRad(e.alpha || 0)
  const b = THREE.MathUtils.degToRad(e.beta || 0)
  const g = THREE.MathUtils.degToRad(e.gamma || 0)
  const orient = getScreenOrientationRad()

  setObjectQuaternion(_qDevice, a, b, g, orient)

  if (!gyroCalib) {
    _qBase.copy(_qDevice)
    _qBaseInv.copy(_qBase).invert()
    gyroCalib = true
  }

  _qFinal.copy(_qBaseInv).multiply(_qDevice)
}

const _dragEuler = new THREE.Euler(0, 0, 0, 'YXZ')
let dragYaw = 0, dragPitch = 0
let dragging = false, prevX = 0, prevY = 0

renderer.domElement.addEventListener('pointerdown', e => {
  if (gyroActive) return
  dragging = true
  prevX = e.clientX
  prevY = e.clientY
}, { passive: true })

window.addEventListener('pointermove', e => {
  if (!dragging || gyroActive) return
  dragYaw -= (e.clientX - prevX) * 0.004
  dragPitch = Math.max(-1.1, Math.min(1.1, dragPitch - (e.clientY - prevY) * 0.004))
  prevX = e.clientX
  prevY = e.clientY
}, { passive: true })
window.addEventListener('pointerup', () => dragging = false, { passive: true })
window.addEventListener('pointercancel', () => dragging = false, { passive: true })

function getLookDirection() {
  return tmpLook.set(0, 0, -1).applyQuaternion(camera.quaternion).normalize()
}

function getPosAtDistance(distance) {
  return camera.position.clone().add(getLookDirection().multiplyScalar(distance))
}

function setBubbleColor(bubble, color) {
  bubble.color.copy(color)
  bubble.mesh.material.color.copy(color)
  bubble.mesh.material.emissive.copy(color)
  bubble.mesh.children[0].material.color.copy(color)
}

function applyScale(bubble, scaleValue) {
  bubble.scale = THREE.MathUtils.clamp(scaleValue, MIN_SCALE, MAX_SCALE)
}

function getBubbleLabel(bubble) {
  return `Bulle ${bubble.id}`
}

function createBubble(position) {
  if (bubbles.length >= MAX_BUBBLES) return

  const id = bubbleIdCounter++
  const geo = new THREE.SphereGeometry(0.20, 28, 28)
  const mesh = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    color: currentColor,
    emissive: currentColor,
    emissiveIntensity: 0.75,
    roughness: 0.2,
    metalness: 0
  }))

  const glow = new THREE.Mesh(
    new THREE.SphereGeometry(0.33, 14, 14),
    new THREE.MeshBasicMaterial({ color: currentColor, transparent: true, opacity: 0.18, depthWrite: false })
  )
  const edge = new THREE.LineSegments(
    new THREE.EdgesGeometry(geo),
    new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.5 })
  )

  mesh.add(glow)
  mesh.add(edge)
  mesh.position.copy(position)
  scene.add(mesh)

  const bubble = {
    id,
    mesh,
    t: Math.random() * 10,
    color: currentColor.clone(),
    scale: currentScale,
    distance: camera.position.distanceTo(position),
    homePosition: position.clone(),
    audioConfig: {
      sourceType: 'sample',
      sampleName: '',
      url: '',
      micLabel: '',
      launchMode: 'continu',
      launchDetail: ''
    },
    trajectory: getTrajectoryConfig(id)
  }
  bubbles.push(bubble)
  selectedBubble = bubble
  syncEditorWithSelected()
  updateStatus()
}

function updateStatus() {
  statusEl.textContent = Array.from({ length: MAX_BUBBLES }, (_, i) => i < bubbles.length ? '●' : '○').join(' ')
}

function syncEditorWithSelected() {
  if (!selectedBubble) return
  currentColor.copy(selectedBubble.color)
  currentScale = selectedBubble.scale
  currentDistance = THREE.MathUtils.clamp(selectedBubble.distance, MIN_DISTANCE, MAX_DISTANCE)
}

function adjustDistance(delta) {
  if (selectedBubble) {
    const distNow = camera.position.distanceTo(selectedBubble.mesh.position)
    const nextDist = THREE.MathUtils.clamp(distNow + delta, MIN_DISTANCE, MAX_DISTANCE)
    tmpDir.copy(selectedBubble.mesh.position).sub(camera.position).normalize()
    selectedBubble.mesh.position.copy(camera.position).add(tmpDir.multiplyScalar(nextDist))
    selectedBubble.homePosition.copy(selectedBubble.mesh.position)
    selectedBubble.distance = nextDist
    currentDistance = nextDist
    return
  }
  currentDistance = THREE.MathUtils.clamp(currentDistance + delta, MIN_DISTANCE, MAX_DISTANCE)
}

function adjustScale(delta) {
  if (selectedBubble) {
    applyScale(selectedBubble, selectedBubble.scale + delta)
    currentScale = selectedBubble.scale
    return
  }
  currentScale = THREE.MathUtils.clamp(currentScale + delta, MIN_SCALE, MAX_SCALE)
}

function changeColor() {
  const col = new THREE.Color().setHSL(Math.random(), 0.95, 0.6)
  if (selectedBubble) {
    setBubbleColor(selectedBubble, col)
    currentColor.copy(col)
    return
  }
  currentColor.copy(col)
}

function pickBubbleFromCrosshair() {
  if (!bubbles.length) {
    selectedBubble = null
    return
  }
  raycaster.setFromCamera(center2D, camera)
  const hits = raycaster.intersectObjects(bubbles.map(b => b.mesh), false)
  if (!hits.length) {
    selectedBubble = null
    return
  }
  const next = bubbles.find(b => b.mesh === hits[0].object) || null
  if (next && next !== selectedBubble) {
    selectedBubble = next
    syncEditorWithSelected()
  }
}

recalBtn.addEventListener('click', () => {
  if (gyroActive) recalibrateGyro()
  else { dragYaw = 0; dragPitch = 0 }
})

clearBtn.addEventListener('click', () => {
  for (const b of bubbles) scene.remove(b.mesh)
  bubbles.length = 0
  selectedBubble = null
  bubbleIdCounter = 1
  currentDistance = MIN_DISTANCE
  currentScale = 1.0
  currentColor.setHSL(Math.random(), 0.95, 0.6)
  updateStatus()
})

minusBtn.addEventListener('click', () => adjustDistance(-DISTANCE_STEP))
plusBtn.addEventListener('click', () => adjustDistance(DISTANCE_STEP))
sizeDownBtn.addEventListener('click', () => adjustScale(-SCALE_STEP))
sizeUpBtn.addEventListener('click', () => adjustScale(SCALE_STEP))
colorBtn.addEventListener('click', changeColor)
placeBtn.addEventListener('click', () => createBubble(getPosAtDistance(currentDistance)))

let lastT = 0
function animate(now) {
  requestAnimationFrame(animate)
  lastT = now

  if (gyroActive && gyroCalib) {
    _qSmooth.slerp(_qFinal, 0.14)
    camera.quaternion.copy(_qSmooth)
  } else if (!gyroActive) {
    _dragEuler.set(dragPitch, dragYaw, 0)
    camera.quaternion.setFromEuler(_dragEuler)
    _qSmooth.copy(camera.quaternion)
  }

  pickBubbleFromCrosshair()

  previewMesh.position.copy(getPosAtDistance(currentDistance))
  previewMesh.scale.setScalar(currentScale)
  previewMesh.material.color.copy(currentColor)
  previewMesh.children[0].material.color.copy(currentColor)

  for (const [idx, b] of bubbles.entries()) {
    b.t += 0.015
    const pulse = 1 + Math.sin(b.t) * 0.05
    b.mesh.scale.setScalar(b.scale * pulse)

    const traj = b.trajectory || getTrajectoryConfig(b.id)
    const phase = b.t * 0.9 * traj.direction + idx * 0.25

    if (traj.type === 'figure8') {
      b.mesh.position.x = b.homePosition.x + Math.sin(phase) * 0.11
      b.mesh.position.y = b.homePosition.y + Math.sin(b.t * 0.75 + idx) * 0.04
      b.mesh.position.z = b.homePosition.z + Math.sin(phase * 2) * 0.06
    } else if (traj.type === 'spiral') {
      const r = 0.03 + (Math.sin(b.t * 0.4) + 1) * 0.04
      b.mesh.position.x = b.homePosition.x + Math.cos(phase) * r
      b.mesh.position.y = b.homePosition.y + Math.sin(phase * 1.4) * 0.06
      b.mesh.position.z = b.homePosition.z + Math.sin(phase) * r
    } else {
      b.mesh.position.x = b.homePosition.x + Math.cos(phase) * 0.08
      b.mesh.position.y = b.homePosition.y + Math.sin(b.t * 0.7 + idx) * 0.05
      b.mesh.position.z = b.homePosition.z + Math.sin(phase) * 0.08
    }

    b.distance = camera.position.distanceTo(b.mesh.position)
  }

  crossDot.setAttribute('fill', selectedBubble ? 'rgba(140,255,220,0.9)' : 'rgba(255,255,255,0.55)')

  if (gyroActive) {
    const e = new THREE.Euler().setFromQuaternion(camera.quaternion, 'YXZ')
    dbgEl.textContent = `gyro ✓  yaw ${THREE.MathUtils.radToDeg(e.y).toFixed(0)}°  d ${currentDistance.toFixed(1)}m` + (selectedBubble ? `  ✎ ${getBubbleLabel(selectedBubble)}` : '')
  } else {
    dbgEl.textContent = `drag  yaw ${THREE.MathUtils.radToDeg(dragYaw).toFixed(0)}°  d ${currentDistance.toFixed(1)}m` + (selectedBubble ? `  ✎ ${getBubbleLabel(selectedBubble)}` : '')
  }

  renderer.render(scene, camera)
}

startBtn.addEventListener('click', async () => {
  permOverlay.style.display = 'none'
  await startCamera()

  if (typeof DeviceOrientationEvent !== 'undefined') {
    let ok = true
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      try { ok = (await DeviceOrientationEvent.requestPermission()) === 'granted' }
      catch (e) { ok = false }
    }
    if (ok) {
      gyroActive = true
      gyroCalib = false
      window.addEventListener('deviceorientation', onGyro, true)
    }
  }

  updateStatus()
  lastT = performance.now()
  animate(lastT)
})

window.addEventListener('resize', () => {
  W = sceneZone.clientWidth
  H = sceneZone.clientHeight
  camera.aspect = W / H
  camera.updateProjectionMatrix()
  renderer.setSize(W, H)
})

})()
</script>
</body>
</html>
