<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compte · SonarNest</title>
    <style>
    :root {
      color-scheme: dark;
      --bg-0: #05070b;
      --bg-1: #101a2a;
      --surface: rgba(255,255,255,0.07);
      --surface-strong: rgba(255,255,255,0.12);
      --text-main: #f5f7fb;
      --text-muted: rgba(245,247,251,0.74);
      --accent: #8fd3ff;
      --danger: #ffb4b4;
      --border: rgba(255,255,255,0.18);
      --shadow: 0 24px 70px rgba(2, 6, 15, 0.55);
      --radius-lg: 24px;
      --radius-md: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', 'Segoe UI', sans-serif;
      background:
        radial-gradient(circle at 20% -12%, #304768 0%, transparent 40%),
        radial-gradient(circle at 92% 12%, #1a304c 0%, transparent 38%),
        linear-gradient(170deg, var(--bg-1), var(--bg-0));
      color: var(--text-main);
      padding: 18px;
      display: grid;
      place-items: center;
      letter-spacing: -0.01em;
    }

    .card {
      width: min(760px, 100%);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: linear-gradient(145deg, var(--surface-strong), var(--surface));
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    h1 { margin: 0; font-size: clamp(26px, 4vw, 36px); letter-spacing: -0.03em; font-weight: 650; }
    p { margin: 0; color: var(--text-muted); line-height: 1.55; }

    .notice {
      border: 1px solid rgba(143, 211, 255, 0.42);
      background: rgba(67, 129, 184, 0.2);
      border-radius: 14px;
      padding: 11px 13px;
      font-size: 13px;
      line-height: 1.5;
      color: #dbefff;
    }

    .auth-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 12px; }

    .panel {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.04);
      padding: 14px;
      display: grid;
      gap: 10px;
    }

    .panel h2 { margin: 0; font-size: 17px; font-weight: 620; letter-spacing: -0.02em; }

    .field { display: grid; gap: 6px; font-size: 13px; color: var(--text-muted); }

    input {
      width: 100%;
      min-height: 40px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(5, 10, 22, 0.7);
      color: var(--text-main);
      padding: 9px 11px;
      font-family: inherit;
      outline: none;
    }

    input:focus {
      border-color: rgba(143, 211, 255, 0.75);
      box-shadow: 0 0 0 3px rgba(143, 211, 255, 0.18);
    }

    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.34);
      background: linear-gradient(180deg, rgba(255,255,255,0.14), rgba(255,255,255,0.06));
      color: var(--text-main);
      border-radius: 12px;
      padding: 10px 11px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 620;
      cursor: pointer;
      min-height: 40px;
      width: 100%;
      transition: transform 160ms ease, border-color 160ms ease;
    }

    .btn:active { transform: translateY(1px); }
    .btn:hover { border-color: rgba(143, 211, 255, 0.7); }

    .btn.logout {
      border-color: rgba(255, 180, 180, 0.55);
      color: var(--danger);
    }

    .session-info {
      font-size: 13px;
      line-height: 1.45;
      color: rgba(255,255,255,0.9);
      white-space: pre-line;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body data-bottom-nav-tab="profil">
  <main class="card">
    <div class="header-row">
      <h1>Compte SonarNest</h1>
    </div>

    <p>Authentification Supabase activée (inscription, connexion, persistance de session, déconnexion).</p>
    <div id="notice" class="notice">Chargement de la session…</div>

    <section class="auth-grid">
      <form id="signupForm" class="panel">
        <h2>Créer un compte</h2>
        <label class="field">Email
          <input id="signupEmail" type="email" autocomplete="email" required />
        </label>
        <label class="field">Mot de passe
          <input id="signupPassword" type="password" minlength="6" autocomplete="new-password" required />
        </label>
        <button type="submit" class="btn">S'inscrire</button>
      </form>

      <form id="loginForm" class="panel">
        <h2>Se connecter</h2>
        <label class="field">Email
          <input id="loginEmail" type="email" autocomplete="email" required />
        </label>
        <label class="field">Mot de passe
          <input id="loginPassword" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="btn">Connexion</button>
      </form>
    </section>

    <section id="sessionPanel" class="panel hidden">
      <h2>Session active</h2>
      <div id="sessionInfo" class="session-info"></div>
      <button id="logoutBtn" type="button" class="btn logout">Se déconnecter</button>
    </section>
  </main>

  <script src="./shared-bottom-nav.js"></script>
  <script src="./supabase-config.js"></script>
  <script src="./supabase-config.local.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-auth.js"></script>
  <script>
    (() => {
      'use strict'

      window.SonarNestUI && window.SonarNestUI.initBottomNav()

      const auth = window.SonarNestAuth
      const nextParam = new URLSearchParams(window.location.search).get('next')
      const noticeEl = document.getElementById('notice')
      const signupForm = document.getElementById('signupForm')
      const loginForm = document.getElementById('loginForm')
      const sessionPanel = document.getElementById('sessionPanel')
      const sessionInfo = document.getElementById('sessionInfo')
      const logoutBtn = document.getElementById('logoutBtn')

      function setNotice(message, isError) {
        noticeEl.textContent = message
        noticeEl.style.borderColor = isError ? 'rgba(255, 166, 166, 0.5)' : 'rgba(162, 223, 255, 0.28)'
        noticeEl.style.background = isError ? 'rgba(255, 78, 78, 0.12)' : 'rgba(104, 198, 255, 0.09)'
      }

      function redirectAfterAuth() {
        if (!nextParam) return
        if (nextParam === 'index') {
          window.location.href = './index.html'
        }
      }

      function renderSession(session) {
        const isLogged = Boolean(session && session.user)
        sessionPanel.classList.toggle('hidden', !isLogged)
        signupForm.classList.toggle('hidden', isLogged)
        loginForm.classList.toggle('hidden', isLogged)

        if (!isLogged) {
          setNotice('Aucune session active. Connecte-toi ou crée un compte.', false)
          sessionInfo.textContent = ''
          return
        }

        const email = session.user.email || 'email inconnu'
        const userId = session.user.id || 'id inconnu'
        const expiry = session.expires_at ? new Date(session.expires_at * 1000).toLocaleString('fr-FR') : 'N/A'
        sessionInfo.textContent = `Email: ${email}\nUser ID: ${userId}\nExpire le: ${expiry}`
        setNotice('Session active et persistée via Supabase Auth.', false)
        redirectAfterAuth()
      }

      async function boot() {
        if (!auth || !auth.isReady) {
          setNotice(`Supabase indisponible: ${(auth && auth.reason) || 'configuration manquante'}.`, true)
          return
        }

        const session = await auth.getSession()
        renderSession(session)

        auth.onAuthStateChange((_event, nextSession) => {
          renderSession(nextSession)
        })
      }

      signupForm.addEventListener('submit', async (event) => {
        event.preventDefault()
        const email = document.getElementById('signupEmail').value.trim()
        const password = document.getElementById('signupPassword').value
        setNotice('Création du compte en cours…', false)

        try {
          const { error } = await auth.signUp(email, password)
          if (error) throw error
          setNotice('Compte créé. Vérifie ta boîte mail si la confirmation est activée.', false)
        } catch (err) {
          setNotice(`Inscription impossible: ${err.message || 'erreur inconnue'}`, true)
        }
      })

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault()
        const email = document.getElementById('loginEmail').value.trim()
        const password = document.getElementById('loginPassword').value
        setNotice('Connexion en cours…', false)

        try {
          const { data, error } = await auth.signInWithPassword(email, password)
          if (error) throw error
          renderSession(data && data.session ? data.session : null)
        } catch (err) {
          setNotice(`Connexion impossible: ${err.message || 'erreur inconnue'}`, true)
        }
      })

      logoutBtn.addEventListener('click', async () => {
        setNotice('Déconnexion en cours…', false)
        try {
          const { error } = await auth.signOut()
          if (error) throw error
        } catch (err) {
          setNotice(`Déconnexion impossible: ${err.message || 'erreur inconnue'}`, true)
        }
      })

      boot().catch((err) => {
        setNotice(`Erreur d'initialisation: ${err.message || 'erreur inconnue'}`, true)
      })
    })()
  </script>
</body>
</html>
