<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compte · SonarNest</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap');
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Quicksand', sans-serif;
      background: radial-gradient(circle at 20% 10%, #182941, #0a1327 52%, #04070f 100%);
      color: #fff;
      padding: 16px;
      display: grid;
      place-items: center;
    }
    .card {
      width: min(720px, 100%);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      padding: 18px;
      display: grid;
      gap: 14px;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    h1 { margin: 0; font-size: clamp(24px, 4vw, 34px); }
    p { margin: 0; opacity: 0.9; line-height: 1.5; }

    .menu-wrap { position: relative; margin-left: auto; }
    .menu-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.32);
      background: rgba(11, 16, 32, 0.5);
      color: #d4e7ff;
      border-radius: 999px;
      padding: 8px 11px;
      font-weight: 700;
      font-size: 14px;
      line-height: 1;
      min-width: 38px;
      min-height: 38px;
      cursor: pointer;
    }
    .burger-menu {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      min-width: 220px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.22);
      background: rgba(6, 10, 24, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.35);
      overflow: hidden;
      z-index: 5;
    }
    .menu-title {
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(174,232,255,0.85);
      padding: 8px 12px 4px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .burger-menu a {
      display: block;
      padding: 8px 12px;
      color: rgba(255,255,255,0.92);
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .notice {
      border: 1px solid rgba(162, 223, 255, 0.28);
      background: rgba(104, 198, 255, 0.09);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.4;
    }

    .auth-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
    }
    .panel {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      padding: 12px;
      display: grid;
      gap: 10px;
    }
    .panel h2 {
      margin: 0;
      font-size: 16px;
    }

    .field {
      display: grid;
      gap: 6px;
      font-size: 13px;
    }
    input {
      width: 100%;
      min-height: 38px;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.24);
      background: rgba(6, 10, 24, 0.55);
      color: #fff;
      padding: 8px 10px;
      font-family: inherit;
    }
    .btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.36);
      background: rgba(6, 13, 28, 0.6);
      color: #fff;
      border-radius: 10px;
      padding: 9px 10px;
      font-family: 'Quicksand', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      min-height: 38px;
      width: 100%;
    }
    .btn.logout {
      border-color: rgba(255, 179, 179, 0.62);
      color: #ffd7d7;
    }
    .session-info {
      font-size: 13px;
      line-height: 1.45;
      color: rgba(255,255,255,0.9);
      white-space: pre-line;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <main class="card">
    <div class="header-row">
      <h1>Compte SonarNest</h1>
      <div class="menu-wrap">
        <button class="menu-btn" id="menuBtn" aria-expanded="false" aria-controls="mainMenu" aria-label="Ouvrir le menu">☰</button>
        <nav class="burger-menu" id="mainMenu" hidden>
          <div class="menu-title">Navigation SonarNest</div>
          <a href="./index.html">Accueil caméra AR</a>
          <a href="./config.html">Store packs</a>
          <a href="./profil.html">Profil utilisateur</a>
        </nav>
      </div>
    </div>

    <p>Authentification Supabase activée (inscription, connexion, persistance de session, déconnexion).</p>
    <div id="notice" class="notice">Chargement de la session…</div>

    <section class="auth-grid">
      <form id="signupForm" class="panel">
        <h2>Créer un compte</h2>
        <label class="field">Email
          <input id="signupEmail" type="email" autocomplete="email" required />
        </label>
        <label class="field">Mot de passe
          <input id="signupPassword" type="password" minlength="6" autocomplete="new-password" required />
        </label>
        <button type="submit" class="btn">S'inscrire</button>
      </form>

      <form id="loginForm" class="panel">
        <h2>Se connecter</h2>
        <label class="field">Email
          <input id="loginEmail" type="email" autocomplete="email" required />
        </label>
        <label class="field">Mot de passe
          <input id="loginPassword" type="password" autocomplete="current-password" required />
        </label>
        <button type="submit" class="btn">Connexion</button>
      </form>
    </section>

    <section id="sessionPanel" class="panel hidden">
      <h2>Session active</h2>
      <div id="sessionInfo" class="session-info"></div>
      <button id="logoutBtn" type="button" class="btn logout">Se déconnecter</button>
    </section>
  </main>

  <script src="./shared-menu.js"></script>
  <script src="./supabase-config.local.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./supabase-auth.js"></script>
  <script>
    (() => {
      'use strict'

      window.SonarNestUI && window.SonarNestUI.initBurgerMenu({
        buttonId: 'menuBtn',
        menuId: 'mainMenu'
      })

      const auth = window.SonarNestAuth
      const noticeEl = document.getElementById('notice')
      const signupForm = document.getElementById('signupForm')
      const loginForm = document.getElementById('loginForm')
      const sessionPanel = document.getElementById('sessionPanel')
      const sessionInfo = document.getElementById('sessionInfo')
      const logoutBtn = document.getElementById('logoutBtn')

      function setNotice(message, isError) {
        noticeEl.textContent = message
        noticeEl.style.borderColor = isError ? 'rgba(255, 166, 166, 0.5)' : 'rgba(162, 223, 255, 0.28)'
        noticeEl.style.background = isError ? 'rgba(255, 78, 78, 0.12)' : 'rgba(104, 198, 255, 0.09)'
      }

      function renderSession(session) {
        const isLogged = Boolean(session && session.user)
        sessionPanel.classList.toggle('hidden', !isLogged)
        signupForm.classList.toggle('hidden', isLogged)
        loginForm.classList.toggle('hidden', isLogged)

        if (!isLogged) {
          setNotice('Aucune session active. Connecte-toi ou crée un compte.', false)
          sessionInfo.textContent = ''
          return
        }

        const email = session.user.email || 'email inconnu'
        const userId = session.user.id || 'id inconnu'
        const expiry = session.expires_at ? new Date(session.expires_at * 1000).toLocaleString('fr-FR') : 'N/A'
        sessionInfo.textContent = `Email: ${email}\nUser ID: ${userId}\nExpire le: ${expiry}`
        setNotice('Session active et persistée via Supabase Auth.', false)
      }

      async function boot() {
        if (!auth || !auth.isReady) {
          setNotice(`Supabase indisponible: ${(auth && auth.reason) || 'configuration manquante'}.`, true)
          return
        }

        const session = await auth.getSession()
        renderSession(session)

        auth.onAuthStateChange((_event, nextSession) => {
          renderSession(nextSession)
        })
      }

      signupForm.addEventListener('submit', async (event) => {
        event.preventDefault()
        const email = document.getElementById('signupEmail').value.trim()
        const password = document.getElementById('signupPassword').value
        setNotice('Création du compte en cours…', false)

        try {
          const { error } = await auth.signUp(email, password)
          if (error) throw error
          setNotice('Compte créé. Vérifie ta boîte mail si la confirmation est activée.', false)
        } catch (err) {
          setNotice(`Inscription impossible: ${err.message || 'erreur inconnue'}`, true)
        }
      })

      loginForm.addEventListener('submit', async (event) => {
        event.preventDefault()
        const email = document.getElementById('loginEmail').value.trim()
        const password = document.getElementById('loginPassword').value
        setNotice('Connexion en cours…', false)

        try {
          const { data, error } = await auth.signInWithPassword(email, password)
          if (error) throw error
          renderSession(data && data.session ? data.session : null)
        } catch (err) {
          setNotice(`Connexion impossible: ${err.message || 'erreur inconnue'}`, true)
        }
      })

      logoutBtn.addEventListener('click', async () => {
        setNotice('Déconnexion en cours…', false)
        try {
          const { error } = await auth.signOut()
          if (error) throw error
        } catch (err) {
          setNotice(`Déconnexion impossible: ${err.message || 'erreur inconnue'}`, true)
        }
      })

      boot().catch((err) => {
        setNotice(`Erreur d'initialisation: ${err.message || 'erreur inconnue'}`, true)
      })
    })()
  </script>
</body>
</html>
